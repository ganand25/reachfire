<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#b8860b"/>
      <stop offset="50%" stopColor="#daa520"/>
      <stop offset="100%" stopColor="#f0d060"/>
    </linearGradient>
  </defs>

  <!-- Background — deep ocean -->
  <rect width="40" height="40" fill="#0a1628" rx="8"/>

  <!-- Outer circle -->
  <circle cx="20" cy="20" r="19" stroke="url(#gradient)" strokeWidth="1.5" opacity="0.3"/>

  <!-- Flame shape -->
  <path
    d="M 20 6 C 20 6 15 12 15 17 C 15 22 17.2 25 20 25 C 22.8 25 25 22 25 17 C 25 12 20 6 20 6 Z"
    fill="url(#gradient)"
  />

  <!-- Inner flame highlight -->
  <path
    d="M 20 10 C 20 10 17 14 17 17 C 17 20 18.3 22 20 22 C 21.7 22 23 20 23 17 C 23 14 20 10 20 10 Z"
    fill="#f5e8c0"
    opacity="0.8"
  />

  <!-- Upward arrow/growth -->
  <path
    d="M 20 28 L 20 34 M 17 31 L 20 28 L 23 31"
    stroke="url(#gradient)"
    strokeWidth="1.5"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  <!-- Reach indicators -->
  <circle cx="14" cy="20" r="1.5" fill="url(#gradient)" opacity="0.7"/>
  <circle cx="26" cy="20" r="1.5" fill="url(#gradient)" opacity="0.7"/>
</svg>
